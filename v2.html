<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Shooting Stars</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }

        .shooting-star {
            position: absolute;
            height: 2px;
            /* Reversed gradient: Bright white at the start (head), transparent at the end (tail) */
            background: linear-gradient(270deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
            opacity: 0;
            /* Scale from the right side (the head) */
            transform-origin: right;
            animation: shoot var(--speed) ease-out forwards;
        }

        @keyframes shoot {
            0% { 
                transform: translate(0, 0) rotate(var(--angle)) scaleX(0); 
                opacity: 0; 
            }
            15% {
                opacity: 1;
            }
            100% { 
                transform: translate(var(--translateX), var(--translateY)) rotate(var(--angle)) scaleX(1); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>

    <script>
        function createStars() {
            const starCount = 150;
            const body = document.body;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.opacity = Math.random();
                body.appendChild(star);
            }
        }

        function spawnShootingStar() {
            const shooter = document.createElement('div');
            shooter.className = 'shooting-star';

            const vw = window.innerWidth;
            const vh = window.innerHeight;

            // 1. Spawn closer to edges
            let startX, startY;
            const edge = Math.floor(Math.random() * 4); // 0: Top, 1: Right, 2: Bottom, 3: Left

            switch(edge) {
                case 0: startX = Math.random() * vw; startY = -10; break;
                case 1: startX = vw + 10; startY = Math.random() * vh; break;
                case 2: startX = Math.random() * vw; startY = vh + 10; break;
                case 3: startX = -10; startY = Math.random() * vh; break;
            }

            shooter.style.left = startX + 'px';
            shooter.style.top = startY + 'px';

            // 2. Aim toward the center (with a little randomness)
            const centerX = vw / 2 + (Math.random() * 200 - 100);
            const centerY = vh / 2 + (Math.random() * 200 - 100);
            
            // Calculate angle in radians, then convert to degrees
            const angleRad = Math.atan2(centerY - startY, centerX - startX);
            const angleDeg = angleRad * (180 / Math.PI);

            // 3. Faster Speed (0.2s to 0.6s)
            const speed = (Math.random() * 0.4 + 0.2) + 's';

            // 4. Travel distance
            const distance = Math.max(vw, vh) * 0.6; 
            const tx = Math.cos(angleRad) * distance;
            const ty = Math.sin(angleRad) * distance;

            shooter.style.setProperty('--angle', `${angleDeg}deg`);
            shooter.style.setProperty('--translateX', `${tx}px`);
            shooter.style.setProperty('--translateY', `${ty}px`);
            shooter.style.setProperty('--speed', speed);
            shooter.style.width = (Math.random() * 150 + 150) + 'px';

            document.body.appendChild(shooter);

            // Cleanup after animation finishes
            setTimeout(() => shooter.remove(), 1000);
        }

        createStars();

        // 5. Higher frequency: Check every 300ms
        setInterval(() => {
            if(Math.random() > 0.4) spawnShootingStar();
        }, 1000);
    </script>
</body>
</html>
